# enamad.example.com — Enamad admin web panel (Flask/gunicorn in Docker)
# Upstream: 127.0.0.1:8095  (web service, host network)
#
# Replace `enamad.example.com` with your subdomain and adjust the certificate
# paths below to your own Let's Encrypt lineage. If you use a wildcard cert
# (*.example.com), this exact server_name still wins over a wildcard vhost.
#
# Get a certificate with:
#   certbot --nginx -d enamad.example.com

server {
    listen 80;
    listen [::]:80;
    server_name enamad.example.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name enamad.example.com;

    ssl_certificate     /etc/letsencrypt/live/example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

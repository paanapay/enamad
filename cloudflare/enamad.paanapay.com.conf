# enamad.paanapay.com — Enamad admin web panel (Flask/gunicorn in Docker)
# Upstream: 127.0.0.1:8095  (web service, host network)
#
# HTTP-only to start. Add HTTPS automatically with:
#   certbot --nginx -d enamad.paanapay.com

server {
    listen 80;
    listen [::]:80;
    server_name enamad.paanapay.com;

    client_max_body_size 20M;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:8095;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

{% extends "base.html" %}
{% set active = 'account' %}
{% block title %}تغییر رمز عبور{% endblock %}
{% block body %}
<h1>تغییر رمز عبور</h1>
<p class="muted">رمز عبور حساب کاربری «{{ current_admin.display_name }}» را تغییر دهید.</p>

<form method="post" class="panel" style="max-width:520px">
  <div class="form-row">
    <label>رمز عبور فعلی *</label>
    <input type="password" name="current_password" required autocomplete="current-password" style="width:100%">
  </div>
  <div class="form-row">
    <label>رمز عبور جدید *</label>
    <input type="password" name="new_password" required minlength="6" autocomplete="new-password" style="width:100%">
    <div class="hint muted">حداقل ۶ کاراکتر</div>
  </div>
  <div class="form-row">
    <label>تکرار رمز عبور جدید *</label>
    <input type="password" name="confirm_password" required minlength="6" autocomplete="new-password" style="width:100%">
  </div>
  <button class="btn" type="submit">تغییر رمز</button>
</form>
{% endblock %}

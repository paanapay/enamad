<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}پنل اعتماد{% endblock %} — Enamad Admin</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/vazir.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  {% if session.get('auth') %}
  <header>
    <div class="bar">
      <span class="brand">🛡️ پنل اعتماد</span>
      <nav>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if active=='dashboard' }}">داشبورد</a>
        <a href="{{ url_for('domains') }}" class="{{ 'active' if active=='domains' }}">دامنه‌ها</a>
        <a href="{{ url_for('estelam') }}" class="{{ 'active' if active=='estelam' }}">استعلام زنده</a>
        <a href="{{ url_for('users') }}" class="{{ 'active' if active=='users' }}">کاربران ربات</a>
      </nav>
      <span class="spacer"></span>
      <nav><a href="{{ url_for('logout') }}" class="logout">خروج</a></nav>
    </div>
  </header>
  {% endif %}
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}پنل اعتماد{% endblock %} — Enamad Admin</title>
  <style>
    :root{
      --bg:#0f172a; --panel:#1e293b; --panel2:#273449; --line:#334155;
      --text:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --accent2:#0ea5e9;
      --green:#22c55e; --amber:#f59e0b; --red:#ef4444; --radius:14px;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Tahoma,"Segoe UI",Vazirmatn,sans-serif;
      background:var(--bg);color:var(--text);line-height:1.7;font-size:14px}
    a{color:var(--accent);text-decoration:none}
    a:hover{text-decoration:underline}
    header{background:linear-gradient(90deg,#0ea5e9,#2563eb);padding:0}
    .bar{max-width:1200px;margin:0 auto;display:flex;align-items:center;
      gap:6px;padding:0 16px;flex-wrap:wrap}
    .brand{font-weight:bold;font-size:18px;color:#fff;padding:14px 10px 14px 20px}
    nav{display:flex;gap:4px;flex-wrap:wrap}
    nav a{color:#e0f2fe;padding:14px 14px;font-weight:600;border-bottom:3px solid transparent}
    nav a:hover{background:rgba(255,255,255,.12);text-decoration:none}
    nav a.active{border-bottom-color:#fff;background:rgba(255,255,255,.1)}
    .spacer{flex:1}
    .logout{color:#fee2e2 !important}
    main{max-width:1200px;margin:22px auto;padding:0 16px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px}
    .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
      padding:18px 20px}
    .stat .num{font-size:30px;font-weight:800;color:#fff;letter-spacing:.5px}
    .stat .lbl{color:var(--muted);font-size:13px;margin-top:4px}
    .panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
      padding:18px 20px;margin-bottom:18px}
    h1{font-size:22px;margin:0 0 18px}
    h2{font-size:17px;margin:0 0 14px;color:#cbd5e1}
    table{width:100%;border-collapse:collapse}
    th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--line);vertical-align:top}
    th{color:var(--muted);font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.4px}
    tbody tr:hover{background:var(--panel2)}
    .stars{color:var(--amber);letter-spacing:2px;white-space:nowrap}
    .tabs{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    .tabs a{padding:8px 16px;border-radius:999px;background:var(--panel2);
      color:var(--muted);border:1px solid var(--line);font-weight:600}
    .tabs a.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
    .searchbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
    input[type=text],input[type=password],input[type=search]{
      background:var(--panel2);border:1px solid var(--line);color:var(--text);
      padding:11px 14px;border-radius:10px;font-size:14px;font-family:inherit;flex:1;min-width:200px}
    input:focus{outline:none;border-color:var(--accent)}
    .btn{background:var(--accent2);color:#fff;border:none;padding:11px 22px;
      border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
    .btn:hover{background:#0284c7}
    .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
    .pager{display:flex;gap:8px;align-items:center;justify-content:center;margin-top:18px}
    .pager a,.pager span{padding:8px 14px;border-radius:10px;background:var(--panel2);
      border:1px solid var(--line)}
    .pager .disabled{opacity:.4;pointer-events:none}
    .badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:700}
    .badge.ok{background:rgba(34,197,94,.15);color:#4ade80}
    .badge.no{background:rgba(148,163,184,.15);color:#cbd5e1}
    .kv{display:grid;grid-template-columns:150px 1fr;gap:8px 14px}
    .kv .k{color:var(--muted)}
    .flash{padding:12px 16px;border-radius:10px;margin-bottom:16px}
    .flash.error{background:rgba(239,68,68,.15);color:#fca5a5;border:1px solid rgba(239,68,68,.3)}
    .muted{color:var(--muted)}
    .mono{font-family:"Consolas",monospace;direction:ltr;unicode-bidi:embed}
    .tag{font-size:12px;padding:2px 8px;border-radius:6px;background:var(--panel2);color:var(--muted)}
    .center{text-align:center}
    .empty{padding:40px;text-align:center;color:var(--muted)}
  </style>
</head>
<body>
  {% if session.get('auth') %}
  <header>
    <div class="bar">
      <span class="brand">🛡️ پنل اعتماد</span>
      <nav>
        <a href="{{ url_for('dashboard') }}" class="{{ 'active' if active=='dashboard' }}">داشبورد</a>
        <a href="{{ url_for('domains') }}" class="{{ 'active' if active=='domains' }}">دامنه‌ها</a>
        <a href="{{ url_for('estelam') }}" class="{{ 'active' if active=='estelam' }}">استعلام زنده</a>
        <a href="{{ url_for('users') }}" class="{{ 'active' if active=='users' }}">کاربران ربات</a>
      </nav>
      <span class="spacer"></span>
      <nav><a href="{{ url_for('logout') }}" class="logout">خروج</a></nav>
    </div>
  </header>
  {% endif %}
  <main>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block body %}{% endblock %}
  </main>
</body>
</html>

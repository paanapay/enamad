services:
  mysql:
    # MariaDB (Ubuntu-based) instead of mysql:8.0, which needs an x86-64-v2 CPU
    # (Oracle Linux 9 glibc) and crashes on older VPS CPUs. Drop-in compatible.
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MARIADB_DATABASE: ${MYSQL_DATABASE:-enamad}
      TZ: ${TZ:-Asia/Tehran}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --innodb-buffer-pool-size=128M
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # Exposed on localhost only for the bot service (host network mode).
      # 3307 avoids clashing with another MySQL on the host.
      - "127.0.0.1:3307:3306"
    healthcheck:
      test: ["CMD-SHELL", "healthcheck.sh --connect --innodb_initialized || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 60s

  # One-shot: create database schema, then exit.
  init:
    build: .
    command: python src/enamad/scraper/extract_enamad.py --init-db
    restart: "no"
    environment: &app_env
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-changeme}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-enamad}
      TZ: ${TZ:-Asia/Tehran}
      LOG_DIR: /app/logs
      BOT_TOKEN: ${BOT_TOKEN:-}
      TELEGRAM_ALLOWED_USERS: ${TELEGRAM_ALLOWED_USERS:-}
      TELEGRAM_ADMIN_USERS: ${TELEGRAM_ADMIN_USERS:-}
      TELEGRAM_LIVE_SEARCH: ${TELEGRAM_LIVE_SEARCH:-yes}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY:-}
      TELEGRAM_API_BASE_URL: ${TELEGRAM_API_BASE_URL:-}
    depends_on:
      mysql:
        condition: service_healthy

  bot:
    build: .
    command: python src/enamad/bots/telegram_bot.py
    restart: unless-stopped
    # Host network so TELEGRAM_PROXY=socks5://127.0.0.1:PORT reaches the
    # SOCKS proxy running on the server (not inside the container).
    network_mode: host
    environment:
      <<: *app_env
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3307"
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - logs_data:/app/logs

  bale-bot:
    build: .
    command: python src/enamad/bots/bale_bot.py
    restart: unless-stopped
    network_mode: host
    environment:
      <<: *app_env
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3307"
      BALE_BOT_TOKEN: ${BALE_BOT_TOKEN:-}
      BALE_ALLOWED_USERS: ${BALE_ALLOWED_USERS:-}
      BALE_ADMIN_USERS: ${BALE_ADMIN_USERS:-}
      BALE_LIVE_SEARCH: ${BALE_LIVE_SEARCH:-yes}
      BALE_PROXY: ${BALE_PROXY:-}
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - logs_data:/app/logs

  web:
    build: .
    # Admin web panel (Flask via gunicorn). Bound to localhost; the host's
    # nginx reverse-proxies enamad.<your-domain> -> 127.0.0.1:8095.
    command: >
      gunicorn --bind 127.0.0.1:8095 --workers 2 --timeout 120 enamad.web.webapp:app
    restart: unless-stopped
    network_mode: host
    environment:
      <<: *app_env
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: "3307"
      WEB_ADMIN_PASSWORD: ${WEB_ADMIN_PASSWORD:-}
      WEB_SECRET_KEY: ${WEB_SECRET_KEY:-}
      WEB_LIVE_SEARCH: ${WEB_LIVE_SEARCH:-yes}
      WEB_PUBLIC_URL: ${WEB_PUBLIC_URL:-}
      # Needed for "message bot users" in the panel (telegram token comes
      # from app_env's BOT_TOKEN).
      BALE_BOT_TOKEN: ${BALE_BOT_TOKEN:-}
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - logs_data:/app/logs

  scheduler:
    build: .
    command: python src/enamad/scheduler/scheduler.py
    restart: unless-stopped
    environment:
      <<: *app_env
      SCHED_UPDATE_CRON: ${SCHED_UPDATE_CRON:-0 3 * * *}
      SCHED_UPDATE_PAGES: ${SCHED_UPDATE_PAGES:-50}
      SCHED_UPDATE_WORKERS: ${SCHED_UPDATE_WORKERS:-1}
      SCHED_UPDATE_CHUNK_PAGES: ${SCHED_UPDATE_CHUNK_PAGES:-10}
      SCHED_REFRESH_CRON: ${SCHED_REFRESH_CRON:-0 */6 * * *}
      SCHED_REFRESH_DAYS: ${SCHED_REFRESH_DAYS:-30}
      SCHED_REFRESH_LIMIT: ${SCHED_REFRESH_LIMIT:-500}
      SCHED_REFRESH_WORKERS: ${SCHED_REFRESH_WORKERS:-4}
      SCHED_REFRESH_MISSING_ONLY: ${SCHED_REFRESH_MISSING_ONLY:-yes}
      SCHED_REFRESH_NEWEST_FIRST: ${SCHED_REFRESH_NEWEST_FIRST:-yes}
      SCHED_RUN_ON_START: ${SCHED_RUN_ON_START:-no}
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - logs_data:/app/logs

volumes:
  mysql_data:
  logs_data:

[mysql]
host = 127.0.0.1
port = 3306
user = root
password =
database = enamad

[scraper]
; delay between captcha chunks in seconds (0 = fastest)
delay = 0.2
; max captcha retries per page
retries = 5

[telegram]
; token from @BotFather
bot_token = YOUR_TOKEN
; comma-separated Telegram user IDs (empty = public bot)
allowed_users =
; search enamad.ir live when domain not in local DB (yes/no)
live_search = yes
; proxy for api.telegram.org (required in filtered networks / Iran)
; examples: http://127.0.0.1:10809  |  socks5://127.0.0.1:10808
proxy =
; optional: custom Bot API server URL (advanced)
api_base_url =
connect_timeout = 30
read_timeout = 30

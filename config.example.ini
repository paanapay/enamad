[mysql]
host = 127.0.0.1
port = 3306
user = root
password =
database = enamad

[scraper]
; delay between captcha chunks in seconds (0 = fastest)
delay = 0.2
; max captcha retries per page
retries = 5

[telegram]
; token from @BotFather
bot_token = YOUR_TOKEN
; comma-separated Telegram user IDs (empty = public bot)
allowed_users =
; admin user IDs (comma-separated) — see user list & admin panel
admin_users =
; search enamad.ir live when domain not in local DB (yes/no)
live_search = yes
; proxy for api.telegram.org (required in filtered networks / Iran)
; examples: http://127.0.0.1:10809  |  socks5://127.0.0.1:10808
proxy =
; optional: custom Bot API server URL (advanced)
api_base_url =
connect_timeout = 30
read_timeout = 30

[bale]
; token from @botfather on Bale (https://ble.ir/botfather)
bot_token = YOUR_TOKEN
; comma-separated Bale user IDs (empty = public bot)
allowed_users =
; admin user IDs (comma-separated) — see user list & admin panel
admin_users =
; search enamad.ir live when domain not in local DB (yes/no)
live_search = yes
; optional proxy (usually not needed for Bale API inside Iran)
proxy =
; Bale Bot API base URL (default shown below)
api_base_url = https://tapi.bale.ai/bot
connect_timeout = 30
read_timeout = 30

[scheduler]
; timezone for cron schedules
timezone = Asia/Tehran
; fetch newly-added domains — cron: min hour day month weekday
update_cron = 0 3 * * *
; re-scan this many pages from the start of the list (new domains appear near front)
update_pages = 50
; workers/chunk for the update run (needs captcha OCR)
update_workers = 1
update_chunk_pages = 10
; refresh existing domains via trust seal (no captcha)
refresh_cron = 0 */6 * * *
; only refresh domains older than N days
refresh_days = 30
; max domains per refresh run
refresh_limit = 500
; parallel worker threads (no captcha)
refresh_workers = 4
; yes = only domains missing address/phone/email
refresh_missing_only = yes
; yes = start from front of enamad site list (same as panel sort=latest)
refresh_newest_first = yes
; run both jobs once at startup (yes/no)
run_on_start = no
; toggles
enable_update = yes
enable_refresh = yes
